<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .calculator {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            color: white;
        }
        
        .btn-add {
            background-color: #4CAF50;
        }
        
        .btn-add:hover {
            background-color: #45a049;
        }
        
        .btn-subtract {
            background-color: #f44336;
        }
        
        .btn-subtract:hover {
            background-color: #da190b;
        }
        
        .btn-multiply {
            background-color: #2196F3;
        }
        
        .btn-multiply:hover {
            background-color: #0b7dda;
        }
        
        .btn-divide {
            background-color: #FF9800;
        }
        
        .btn-divide:hover {
            background-color: #e68900;
        }
        
        .result-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
        }
        
        .result-label {
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
        }
        
        .result {
            font-size: 24px;
            color: #667eea;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 5px;
        }
        
        .clear-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: #999;
            font-size: 16px;
        }
        
        .clear-btn:hover {
            background-color: #777;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>Calculator</h1>
        
        <div class="input-group">
            <label for="num1">First Number:</label>
            <input type="number" id="num1" placeholder="Enter first number">
        </div>
        
        <div class="input-group">
            <label for="num2">Second Number:</label>
            <input type="number" id="num2" placeholder="Enter second number">
        </div>
        
        <div class="buttons">
            <button class="btn-add" onclick="add()">Add (+)</button>
            <button class="btn-subtract" onclick="subtract()">Subtract (-)</button>
            <button class="btn-multiply" onclick="multiply()">Multiply (*)</button>
            <button class="btn-divide" onclick="divide()">Divide (/)</button>
        </div>
        
        <div class="result-section">
            <div class="result-label">Result:</div>
            <div class="result" id="result">0</div>
        </div>
        
        <button class="clear-btn" onclick="clearCalc()">Clear</button>
    </div>
    
    <script src="calculator.js"></script>
</body>
</html>
